version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: food-ordering-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-food_ordering}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-ordering-network

  redis:
    image: redis:7-alpine
    container_name: food-ordering-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-ordering-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-ordering-backend
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-food_ordering}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://lotfood.ru,https://www.lotfood.ru}
      FRONTEND_URL: ${FRONTEND_URL:-https://lotfood.ru}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      ALLOWED_FILE_TYPES: ${ALLOWED_FILE_TYPES:-image/jpeg,image/png,image/jpg}
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.45}
      FACE_AMBIGUITY_GAP: ${FACE_AMBIGUITY_GAP:-0.02}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@lotfood.ru}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - food-ordering-network

volumes:
  postgres_data:
  redis_data:

networks:
  food-ordering-network:
    driver: bridge
